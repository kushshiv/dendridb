services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dendridb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dendridb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dendridb}
      POSTGRES_DB: ${POSTGRES_DB:-dendridb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dendridb_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dendridb} -d ${POSTGRES_DB:-dendridb}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dendridb-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  dendridb_postgres_data:
