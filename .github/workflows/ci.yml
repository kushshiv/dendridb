name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up project
        run: make setup
      - name: Format check
        run: make lint-check

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up project
        run: make setup
      - name: Run unit tests
        run: make test-unit

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dendridb
          POSTGRES_PASSWORD: dendridb
          POSTGRES_DB: dendridb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dendridb -d dendridb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      RUN_INTEGRATION_TESTS: "1"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: dendridb
      POSTGRES_PASSWORD: dendridb
      POSTGRES_DB: dendridb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up project
        run: make setup
      - name: Run migrations
        run: make migrate
      - name: Run integration tests
        run: make test-integration

  test-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dendridb
          POSTGRES_PASSWORD: dendridb
          POSTGRES_DB: dendridb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dendridb -d dendridb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      RUN_E2E_TESTS: "1"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: dendridb
      POSTGRES_PASSWORD: dendridb
      POSTGRES_DB: dendridb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up project
        run: make setup
      - name: Run migrations
        run: make migrate
      - name: Run e2e tests
        run: make test-e2e

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t dendridb:test .
